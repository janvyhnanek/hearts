<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#180b10" />
  <title>Srdíčka pro malý zázrak</title>
  <meta name="description" content="Minimalistická radostná stránka: klikni nebo klepni a nech rozletět červená srdíčka." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page" aria-label="Interaktivní stránka se srdíčky">
    <section class="hero" aria-live="polite">
      <div class="halo halo-one" aria-hidden="true"></div>
      <div class="halo halo-two" aria-hidden="true"></div>

      <div class="card">
        <div class="line-art" aria-hidden="true">
          <svg viewBox="0 0 420 360" role="img" aria-label="Jemná line-art ilustrace těhotenství">
            <path class="parent-line" d="M146 57c-28 30-38 67-31 111 5 30 18 53 38 73" />
            <path class="parent-line" d="M181 54c-4 40 1 73 18 99 14 22 35 35 59 39" />
            <path class="belly-line" d="M171 142c50-18 108 11 122 63 13 49-21 104-75 114-54 10-108-27-114-82" />
            <path class="parent-line" d="M211 70c18 10 30 25 35 47" />
            <path class="parent-line" d="M145 242c20 18 43 27 72 26" />
            <path class="heart-line" d="M235 222c-8-13-29-11-31 7-2 18 31 34 31 34s34-18 31-35c-3-17-23-19-31-6z" />
          </svg>
        </div>

        <h1>Těšíme se na tebe!</h1>

        <div class="pregnancy-status" aria-label="Aktuální délka těhotenství">
          <div class="pregnancy-progress">
            <div class="progress-topline">
              <span class="status-label">Loading baby</span>
              <strong id="pregnancy-percent">--</strong>
            </div>
            <div class="progress-track" role="progressbar" aria-label="Průběh těhotenství" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <span class="progress-fill" id="pregnancy-progress-fill"></span>
            </div>
          </div>

          <div class="status-item">
            <span class="status-label">Těhotenství</span>
            <strong id="pregnancy-weeks">--</strong>
          </div>
          <div class="status-item">
            <span class="status-label">Od začátku</span>
            <strong id="pregnancy-calendar">--</strong>
          </div>
          <div class="status-item">
            <span class="status-label">Termín</span>
            <strong>17. 9.</strong>
          </div>
        </div>

        <button class="calculator-toggle" type="button" aria-expanded="false" aria-controls="calculator-panel">
          Těhotenská kalkulačka
        </button>

        <div class="calculator-panel" id="calculator-panel" hidden>
          <div class="calculator-note">
            Orientační přepočet počítá s průměrným kalendářním měsícem 30,44 dne.
          </div>

          <div class="calculator-grid">
            <form class="calculator-form" id="calendar-to-pregnancy">
              <h2>Kalendářní → týdny</h2>
              <div class="fields">
                <label>
                  <span>Měsíce</span>
                  <input name="months" type="number" inputmode="numeric" min="0" step="1" value="1" />
                </label>
                <label>
                  <span>Dny</span>
                  <input name="days" type="number" inputmode="numeric" min="0" step="1" value="0" />
                </label>
              </div>
              <output class="result" name="result">1 měsíc a 0 dní ≈ 4 týdny a 2 dny</output>
            </form>

            <form class="calculator-form" id="pregnancy-to-calendar">
              <h2>Týdny → kalendářní</h2>
              <div class="fields">
                <label>
                  <span>Týdny</span>
                  <input name="weeks" type="number" inputmode="numeric" min="0" step="1" value="4" />
                </label>
                <label>
                  <span>Dny</span>
                  <input name="days" type="number" inputmode="numeric" min="0" step="1" value="2" />
                </label>
              </div>
              <output class="result" name="result">4 týdny a 2 dny ≈ 0 měsíců a 30 dní</output>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
